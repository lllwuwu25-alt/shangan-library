name: Build Offline Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "offline-v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }} Offline Package
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            artifact-name: shangan-library-offline-macos
          - label: Windows
            os: windows-latest
            artifact-name: shangan-library-offline-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build offline package
        run: npm run offline:package

      - name: Upload offline package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: offline-build/上岸资料库-本地版/**
          if-no-files-found: error
