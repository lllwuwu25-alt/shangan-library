name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-latest
            artifact-name: shangan-library-macos-apple-silicon
            build-args: -- --bundles dmg
            artifact-path: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - label: macOS Intel
            os: macos-15-intel
            artifact-name: shangan-library-macos-intel
            build-args: -- --bundles dmg
            artifact-path: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - label: Windows
            os: windows-latest
            artifact-name: shangan-library-windows
            build-args: -- --bundles nsis
            artifact-path: src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build desktop app
        run: npm run desktop:build ${{ matrix.build-args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
