<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <title>上岸资料库 - 离线</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #0f172a;
        background: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      }

      main {
        max-width: 420px;
        padding: 24px;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        background: #fff;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>当前处于离线状态</h1>
      <p>上岸资料库会继续保留本机已保存的数据。请在网络恢复后重新打开应用，以加载最新页面资源。</p>
    </main>
  </body>
</html>
